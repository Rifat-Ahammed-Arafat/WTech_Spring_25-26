<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Management</title>
    <link rel="stylesheet" href="../Design/Style.css">
</head>
<body>

<div class="container">
    <form>
        <fieldset>
            <legend>Product Management Page</legend>

            <div class="input-group">
                <label for="unitPrice">Unit Price:</label>
                <input type="text" id="unitPrice" value="1000" readonly>
            </div>

            <div class="input-group">
                <label for="quantity">Quantity per Day:</label>
                <input type="number" id="quantity" placeholder="Enter quantity per day">
            </div>

            <div class="input-group">
                <label for="totalPrice">Total Price for30 Days:</label>
                <input type="text" id="totalPrice" value="0" readonly>
            </div>

        </fieldset>
    </form>
</div>

<script src="../JS/Validation.js"></script>

</body>
</html>
